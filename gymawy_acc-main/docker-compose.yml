services:
  mongo:
    image: mongo:7
    container_name: gemawi-mongodb
    restart: always
    command: ["mongod", "--auth", "--bind_ip_all"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_ROOT_USER}", "-p", "${MONGO_ROOT_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - gemawi-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gemawi-backend
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=30d
      - FRONTEND_URL=${FRONTEND_URL:-https://gymmawy.net}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://gymmawy.net}
      - RATE_LIMIT_WINDOW=15
      - RATE_LIMIT_MAX=100
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
    networks:
      - gemawi-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gemawi-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - gemawi-network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  gemawi-network:
    driver: bridge

volumes:
  mongodb_data:
    name: mongodb_data
    external: true
